name: CampConnect
options:
  bundleIdPrefix: com.campconnect
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.1"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""                # set your Apple Dev team in Xcode
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  CampConnect:
    type: application
    platform: iOS
    sources:
      - path: CampConnect
    info:
      path: CampConnect/Resources/Info.plist
      properties:
        CFBundleDisplayName: Campfire
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Media capture for challenge submissions
        NSCameraUsageDescription: "Campfire uses the camera so campers can record challenge submissions."
        NSPhotoLibraryUsageDescription: "Campfire lets campers choose photos and videos for challenge submissions."
        NSMicrophoneUsageDescription: "Campfire uses the microphone to record video submissions."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.campconnect.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        TARGETED_DEVICE_FAMILY: "1"     # iPhone only for the MVP
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
